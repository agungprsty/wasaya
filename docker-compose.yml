services:
  db:
    image: postgres:16
    container_name: whatsapp_gateway_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: whatsapp_user
      POSTGRES_PASSWORD: whatsapp_password
      POSTGRES_DB: whatsapp_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_user -d whatsapp_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: whatsapp_gateway_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://whatsapp_user:whatsapp_password@db:5432/whatsapp_gateway
      # Add other environment variables as needed for your WhatsApp gateway
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: